name: Deploy to Cloudflare Pages

# Ported from arhsmoque/legacy-DPIK-TUGAS-App/.github/workflows/deploy.yml.
# Same trigger shape, same Cloudflare Pages project name (dpiktugas) -- this
# deliberately replaces the legacy deployment at the same live URL rather
# than standing up a separate one. Dormant until CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID exist as repository secrets; the wrangler step below
# fails fast and clearly if they are absent, so an unconfigured repo never
# deploys silently.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cf-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TUGAS_GATE_MODE: ${{ vars.VITE_TUGAS_GATE_MODE }}
          VITE_TUGAS_OPEN_PASSPHRASE: ${{ secrets.VITE_TUGAS_OPEN_PASSPHRASE }}

      - name: Check Cloudflare credentials are configured
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID repository secrets are not set. Add them (Settings > Secrets and variables > Actions) to enable deployment."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy dist/internal --project-name=dpiktugas --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
